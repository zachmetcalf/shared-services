services:
  slack-proxy:
    image: ${SLACK_PROXY_IMAGE:-ghcr.io/zachmetcalf/slack-proxy:latest}
    container_name: slack-proxy
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      SLACK_TOKEN_STORE_PATH: /data/token-store.json
    volumes:
      - ${SLACK_PROXY_DATA_DIR:-./data}:/data
    ports:
      - "127.0.0.1:8082:8082"
